<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الدرس | فيزياء.تك</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Markdown & Highlight.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Alexandria', 'sans-serif'],
                        mono: ['Alexandria', 'monospace'],
                    },
                    colors: {
                        primary: '#2563eb',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Alexandria', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Dark Mode */
        html.dark body { background-color: #121212; color: #e5e5e5; }
        html.dark .nav-blur { background-color: rgba(18, 18, 18, 0.9); border-color: #2a2a2a; }
        html.dark .bg-white { background-color: #1e1e1e; border-color: #2a2a2a; }
        html.dark .text-gray-900, html.dark h1, html.dark h2, html.dark h3 { color: #ffffff !important; }
        html.dark .text-gray-600 { color: #a3a3a3; }
        
        .nav-blur {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .markdown-content pre {
            background: #1e1e1e !important;
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            overflow-x: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .markdown-content code { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
        .markdown-content h3 { font-size: 1.5rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1.25rem; color: #1e293b; border-right: 4px solid #2563eb; padding-right: 1rem; }
        html.dark .markdown-content h3 { color: #f1f5f9; }
        .markdown-content p { margin-bottom: 1.25rem; line-height: 1.8; font-size: 1.05rem; }
        .markdown-content ul { list-style: disc; padding-right: 1.5rem; margin-bottom: 1.25rem; }
        .markdown-content li { margin-bottom: 0.5rem; }
    </style>
    <script src="theme.js"></script>
</head>
<body class="bg-[#fafafa] text-gray-800 antialiased transition-colors duration-300">

    <nav class="fixed w-full top-0 z-50 nav-blur border-b border-gray-100 dark:border-gray-800 transition-all">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 md:px-8 h-16 flex justify-between items-center">
            <a href="index.html" class="font-extrabold text-xl tracking-tight text-gray-900 dark:text-white flex items-center gap-2">
                <span class="text-primary font-serif italic text-2xl">Ψ</span>فيزياء.تك
            </a>
            <div class="flex items-center gap-4">
                <a href="programming.html" class="text-sm font-bold text-primary hover:underline flex items-center gap-2">
                    <i class="fa-solid fa-arrow-right"></i> العودة للمسارات
                </a>
                <button class="theme-toggle text-gray-400 hover:text-gray-900 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 cursor-pointer">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 md:px-8 pt-24 sm:pt-32 pb-16 sm:pb-24">
        <!-- Breadcrumb -->
        <nav class="mb-10 text-sm font-medium text-gray-500 dark:text-gray-400" aria-label="Breadcrumb">
            <ol class="flex items-center gap-2 flex-wrap">
                <li><a href="index.html" class="hover:text-primary transition-colors flex items-center gap-1.5 font-bold"><i class="fa-solid fa-house text-xs"></i> الرئيسية</a></li>
                <li><i class="fa-solid fa-chevron-left text-[10px] opacity-50"></i></li>
                <li><a href="programming.html" class="hover:text-primary transition-colors">البرمجة</a></li>
                <li><i class="fa-solid fa-chevron-left text-[10px] opacity-50"></i></li>
                <li id="breadcrumb-course" class="hover:text-primary transition-colors cursor-pointer"></li>
                <li><i class="fa-solid fa-chevron-left text-[10px] opacity-50"></i></li>
                <li id="breadcrumb-lesson" class="text-gray-900 dark:text-gray-100 font-bold truncate max-w-xs">الدرس</li>
            </ol>
        </nav>

        <header class="mb-12">
            <div id="course-tag" class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4"></div>
            <h1 id="lesson-title" class="text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-extrabold text-gray-900 dark:text-white mb-4 sm:mb-6 leading-tight">جاري التحميل...</h1>
            <p id="lesson-desc" class="text-lg text-gray-600 dark:text-gray-400 leading-relaxed"></p>
        </header>

        <article id="lesson-content" class="markdown-content bg-white dark:bg-[#1a1a1a] p-4 sm:p-8 md:p-12 rounded-2xl sm:rounded-3xl border border-gray-100 dark:border-gray-800 shadow-sm min-h-[300px] sm:min-h-[400px]">
             <!-- Content injected here -->
        </article>

        <section id="references-section" class="mt-16 pt-10 border-t border-gray-100 dark:border-gray-800">
            <h4 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-8 flex items-center gap-3">
                <i class="fa-solid fa-book-open text-primary"></i> مصادر خارجية للمراجعة والتعمق
            </h4>
            <div id="refs-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <!-- Refs injected here -->
            </div>
        </section>

        <!-- Navigation Buttons -->
        <div class="mt-10 sm:mt-16 flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-3 sm:gap-4">
            <button id="prev-lesson" class="flex-1 px-4 sm:px-6 py-3 sm:py-4 bg-gray-100 dark:bg-gray-800 rounded-xl sm:rounded-2xl font-bold hover:bg-gray-200 dark:hover:bg-gray-700 transition-all text-right group hidden">
                <span class="block text-[10px] text-gray-500 uppercase mb-1">الدرس السابق</span>
                <span id="prev-title" class="group-hover:text-primary transition-colors text-sm sm:text-base truncate block"></span>
            </button>
            <button id="next-lesson" class="flex-1 px-4 sm:px-6 py-3 sm:py-4 bg-primary text-white rounded-xl sm:rounded-2xl font-bold hover:bg-blue-700 transition-all text-left group hidden">
                <span class="block text-[10px] text-white/70 uppercase mb-1">الدرس القادم</span>
                <span id="next-title" class="text-sm sm:text-base truncate block"></span>
            </button>
        </div>
    </main>

    <script src="courses_lang.js"></script>
    <script src="courses_frameworks.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const courseId = params.get('course');
            const lessonIdx = parseInt(params.get('index'));

            let coursesData = {};
            if (typeof languagesData !== 'undefined') Object.assign(coursesData, languagesData);
            if (typeof frameworksData !== 'undefined') Object.assign(coursesData, frameworksData);

            const course = coursesData[courseId];
            if (!course || isNaN(lessonIdx) || !course.lessons[lessonIdx]) {
                window.location.href = 'programming.html';
                return;
            }

            const lesson = course.lessons[lessonIdx];
            
            // Populate Data
            document.title = `${lesson.title} - ${course.tabName} | فيزياء.تك`;
            document.getElementById('lesson-title').innerText = lesson.title;
            document.getElementById('lesson-desc').innerText = lesson.desc;
            document.getElementById('breadcrumb-course').innerText = course.tabName;
            document.getElementById('breadcrumb-course').onclick = () => window.location.href = `programming.html?course=${courseId}`;
            document.getElementById('breadcrumb-lesson').innerText = lesson.title;

            // Course Tag
            const tag = document.getElementById('course-tag');
            tag.innerText = course.tabName;
            tag.style.backgroundColor = course.hexColor + '20';
            tag.style.color = course.hexColor;

            // Content
            const contentBox = document.getElementById('lesson-content');
            if (lesson.content) {
                contentBox.innerHTML = marked.parse(lesson.content);
                contentBox.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            } else {
                contentBox.innerHTML = `<div class="text-center py-20 text-gray-400 italic">محتوى هذا الدرس قيد التجهيز...</div>`;
            }

            // Refs
            const refsList = document.getElementById('refs-list');
            refsList.innerHTML = lesson.refs.map(ref => `
                <a href="${ref.url}" target="_blank" class="flex items-center gap-4 p-4 rounded-2xl border border-gray-100 dark:border-gray-800 hover:border-primary/40 hover:shadow-sm transition-all group">
                    <div class="w-12 h-12 rounded-xl bg-gray-50 dark:bg-gray-900 flex items-center justify-center text-xl shrink-0">
                        <i class="fa-brands ${ref.icon} ${ref.icon === 'fa-youtube' ? 'text-red-500' : 'text-blue-500'}"></i>
                    </div>
                    <div class="flex-1">
                        <h5 class="font-bold text-gray-900 dark:text-white group-hover:text-primary transition-colors">${ref.text}</h5>
                        <span class="text-[10px] text-gray-400">انتقال للمصدر الخارجي</span>
                    </div>
                    <i class="fa-solid fa-external-link text-[10px] text-gray-300"></i>
                </a>
            `).join('');

            // Navigation
            const prev = document.getElementById('prev-lesson');
            if (lessonIdx > 0) {
                prev.classList.remove('hidden');
                document.getElementById('prev-title').innerText = course.lessons[lessonIdx-1].title;
                prev.onclick = () => window.location.href = `lesson-view.html?course=${courseId}&index=${lessonIdx-1}`;
            }

            const next = document.getElementById('next-lesson');
            if (lessonIdx < course.lessons.length - 1) {
                next.classList.remove('hidden');
                document.getElementById('next-title').innerText = course.lessons[lessonIdx+1].title;
                next.onclick = () => window.location.href = `lesson-view.html?course=${courseId}&index=${lessonIdx+1}`;
            }
        });
    </script>
</body>
</html>
