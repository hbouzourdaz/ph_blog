<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المستودع الرقمي | فيزياء.تك</title>
    <meta name="description" content="مستودع شامل يجمع أفضل البرامج، التطبيقات، الكتب، والألعاب العلمية والتقنية في مكان واحد.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Alexandria & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Alexandria', 'sans-serif'],
                        mono: ['Alexandria', 'monospace'],
                    },
                    colors: {
                        primary: '#2563eb',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Alexandria', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::selection { background-color: #dbeafe; color: #1e3a8a; }
        html { scroll-behavior: smooth; }
        
        /* Dark Mode overrides - Matching Index.html */
        html.dark body { background-color: #121212; color: #e5e5e5; }
        html.dark .nav-blur { background-color: rgba(18, 18, 18, 0.9); border-color: #2a2a2a; }
        html.dark .bg-white { background-color: #1e1e1e; border-color: #2a2a2a; }
        html.dark .text-gray-900, html.dark h1, html.dark h2, html.dark h3 { color: #ffffff !important; }
        html.dark .border-gray-100, html.dark .border-gray-200, html.dark .border-gray-700 { border-color: #2a2a2a !important; }
        html.dark .bg-gray-50 { background-color: #1e1e1e; }
        html.dark .bg-gray-100 { background-color: #2a2a2a; }

        .nav-blur {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .hub-card {
            transition: all 0.3s ease;
        }
        .hub-card:hover {
            transform: translateY(-4px);
            border-color: #2563eb;
        }
    </style>
    <script src="theme.js"></script>
</head>
<body class="bg-[#fafafa] text-gray-800 antialiased transition-colors duration-300 relative">

    <!-- Spacetime Grid (Matching Index) -->
    <div class="fixed inset-0 pointer-events-none z-[-1]">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#e5e5e5_1px,transparent_1px),linear-gradient(to_bottom,#e5e5e5_1px,transparent_1px)] bg-[size:32px_32px] dark:hidden"></div>
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#ffffff05_1px,transparent_1px),linear-gradient(to_bottom,#ffffff05_1px,transparent_1px)] bg-[size:32px_32px] hidden dark:block"></div>
        <div class="absolute left-0 right-0 top-0 h-[600px] w-full bg-[radial-gradient(circle_400px_at_50%_0%,#3b82f610,transparent)]"></div>
    </div>

    <!-- Minimal Navbar -->
    <nav class="fixed w-full top-0 z-50 nav-blur border-b border-gray-100 transition-all">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 md:px-8">
            <div class="flex justify-between items-center h-16 relative">
                <a href="index.html" class="font-extrabold text-xl tracking-tight text-gray-900 group hover:text-primary transition-colors flex items-center gap-2">
                    <span class="text-primary font-serif italic text-2xl group-hover:rotate-12 transition-transform duration-300">Ψ</span>
                    فيزياء<span class="text-primary opacity-50">.</span>تك
                </a>
                <!-- Desktop Menu -->
                <div class="hidden sm:flex items-center space-x-6 space-x-reverse">
                    <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-primary transition-colors">الفيزياء</a>
                    <a href="programming.html" class="text-sm font-medium text-gray-500 hover:text-primary transition-colors">البرمجة</a>
                    <a href="hub.html" class="text-sm font-bold text-primary border-b-2 border-primary pb-1">المستودع الرقمي</a>
                    <a href="about.html" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">عن المنصة</a>
                    <div id="admin-menu" class="flex items-center gap-2"></div>
                </div>

                <div class="flex items-center gap-4">
                    <button class="theme-toggle text-gray-400 hover:text-gray-900 transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 cursor-pointer">
                        <i class="fa-solid fa-moon dark:hidden"></i>
                        <i class="fa-solid fa-sun hidden dark:block"></i>
                    </button>
                    <button id="mobile-menu-btn" class="sm:hidden text-gray-500 hover:text-gray-900 w-8 h-8 flex items-center justify-center">
                        <i class="fa-solid fa-bars-staggered" id="menu-icon-open"></i>
                        <i class="fa-solid fa-xmark hidden" id="menu-icon-close"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu Panel -->
        <div id="mobile-menu" class="sm:hidden hidden border-t border-gray-100 dark:border-gray-800 nav-blur">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 py-6 flex flex-col gap-4">
                <a href="index.html" class="text-base font-bold text-gray-900 dark:text-white hover:text-primary transition-colors py-2 border-b border-gray-100 dark:border-gray-800">الفيزياء</a>
                <a href="programming.html" class="text-base font-bold text-gray-900 dark:text-white hover:text-primary transition-colors py-2 border-b border-gray-100 dark:border-gray-800">البرمجة</a>
                <a href="hub.html" class="text-base font-bold text-primary py-2 border-b border-gray-100 dark:border-gray-800">المستودع الرقمي</a>
                <a href="about.html" class="text-base font-bold text-gray-900 dark:text-white hover:text-primary transition-colors py-2 border-b border-gray-100 dark:border-gray-800">عن المنصة</a>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="max-w-4xl mx-auto px-4 sm:px-6 md:px-8 pt-28 sm:pt-32 pb-8 sm:pb-12 text-center sm:text-right">
        <h1 class="text-2xl sm:text-3xl md:text-5xl font-black text-gray-900 tracking-tight mb-4 sm:mb-6">المستودع الرقمي</h1>
        <p class="text-gray-600 dark:text-gray-400 text-base sm:text-lg leading-relaxed max-w-2xl">
            دليلك الشامل لأفضل الأدوات والبرمجيات والكتب في مجالي الفيزياء والبرمجة.
        </p>
    </header>

    <!-- Category Filters -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 md:px-8 mb-8 sm:mb-10">
        <div class="flex flex-wrap gap-2">
            <button onclick="renderHub('all')" class="category-btn px-4 py-2 bg-primary text-white rounded-lg text-sm font-bold shadow-sm transition-all" data-type="all">الكل</button>
            <button onclick="renderHub('software')" class="category-btn px-4 py-2 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-lg text-sm font-bold transition-all hover:bg-gray-200 dark:hover:bg-gray-700" data-type="software">البرمجيات</button>
            <button onclick="renderHub('apps')" class="category-btn px-4 py-2 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-lg text-sm font-bold transition-all hover:bg-gray-200 dark:hover:bg-gray-700" data-type="apps">أدوات الويب</button>
            <button onclick="renderHub('books')" class="category-btn px-4 py-2 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-lg text-sm font-bold transition-all hover:bg-gray-200 dark:hover:bg-gray-700" data-type="books">الكتب</button>
            <button onclick="renderHub('games')" class="category-btn px-4 py-2 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-lg text-sm font-bold transition-all hover:bg-gray-200 dark:hover:bg-gray-700" data-type="games">الألعاب</button>
        </div>
    </div>

    <!-- Grid Container -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 md:px-8 pb-24 sm:pb-32">
        <div id="hub-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
            <!-- Items injected here -->
        </div>
    </main>

    <!-- Footer (Matching Index) -->
    <footer class="bg-gray-50 dark:bg-[#1a1a1a] border-t border-gray-100 dark:border-gray-800 py-12">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 md:px-8 flex flex-col sm:flex-row justify-between items-center gap-4 sm:gap-6">
            <div class="text-xs sm:text-sm font-bold text-gray-400 dark:text-gray-600 font-mono tracking-widest uppercase">
                &copy; 2026 Physique.tech
            </div>
            <div class="flex flex-wrap justify-center gap-3 sm:gap-6 text-[10px] sm:text-xs font-bold font-mono tracking-widest uppercase text-gray-400 dark:text-gray-500">
                <a href="index.html" class="hover:text-primary transition-colors">الرئيسية</a>
                <a href="programming.html" class="hover:text-primary transition-colors">البرمجة</a>
                <a href="about.html" class="hover:text-primary transition-colors">عن المنصة</a>
                <a href="privacy.html" class="hover:text-primary transition-colors">الخصوصية</a>
            </div>
        </div>
    </footer>

    <script src="hub_data.js"></script>
    <script>
        function renderHub(filter = 'all') {
            const grid = document.getElementById('hub-grid');
            grid.innerHTML = '';
            
            // Buttons UI Update
            document.querySelectorAll('.category-btn').forEach(btn => {
                if(btn.dataset.type === filter) {
                    btn.classList.remove('bg-gray-100', 'dark:bg-gray-800', 'text-gray-700', 'dark:text-gray-300');
                    btn.classList.add('bg-primary', 'text-white');
                } else {
                    btn.classList.add('bg-gray-100', 'dark:bg-gray-800', 'text-gray-700', 'dark:text-gray-300');
                    btn.classList.remove('bg-primary', 'text-white');
                }
            });

            let items = [];
            if(filter === 'all') {
                Object.values(hubData).forEach(group => items = [...items, ...group]);
            } else {
                items = hubData[filter] || [];
            }

            items.forEach(item => {
                const card = `
                    <div class="hub-card bg-white dark:bg-[#1a1a1a] p-6 rounded-2xl border border-gray-100 dark:border-gray-800 flex items-start gap-5">
                        <div class="w-12 h-12 flex-shrink-0 bg-gray-50 dark:bg-gray-800 rounded-xl flex items-center justify-center text-xl text-primary shadow-sm">
                            <i class="${item.icon}"></i>
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-bold text-gray-900 dark:text-white">${item.title}</h3>
                                <span class="text-[10px] font-bold text-gray-400 bg-gray-50 dark:bg-gray-800 px-2 py-0.5 rounded border border-gray-100 dark:border-gray-800">${item.category}</span>
                            </div>
                            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4 line-clamp-2">${item.desc}</p>
                            <a href="${item.link}" target="_blank" class="text-xs font-bold text-primary hover:underline flex items-center gap-1 group">
                                زيارة الموقع <i class="fa-solid fa-arrow-left text-[10px] transition-transform group-hover:translate-x-[-2px]"></i>
                            </a>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => renderHub());

        // Mobile Menu Toggle
        const btn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIconOpen = document.getElementById('menu-icon-open');
        const menuIconClose = document.getElementById('menu-icon-close');
        btn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            menuIconOpen.classList.toggle('hidden');
            menuIconClose.classList.toggle('hidden');
        });
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                menuIconOpen.classList.remove('hidden');
                menuIconClose.classList.add('hidden');
            });
        });
    </script>
</body>
</html>
