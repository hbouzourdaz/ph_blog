    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Get ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                showError("عذراً، لم يتم العثور على المقال.");
                return;
            }

            const article = typeof articlesList !== 'undefined' ? articlesList.find(a => a.id === id) : null;

            if (!article) {
                showError("عذراً، المقال المطلوب غير موجود أو تم حذفه.");
                return;
            }

            // Populate Article Header
            const headerHtml = `
                <!-- Breadcrumb -->
                <nav class="mb-8 text-sm font-medium text-gray-500 dark:text-gray-400" aria-label="Breadcrumb">
                    <ol class="flex items-center gap-2 flex-wrap">
                        <li>
                            <a href="index.html" class="hover:text-primary transition-colors flex items-center gap-1.5 font-bold"><i class="fa-solid fa-house text-xs"></i> الرئيسية</a>
                        </li>
                        <li><i class="fa-solid fa-chevron-left text-[10px] opacity-50"></i></li>
                        <li>
                            <a href="index.html#articles" class="hover:text-primary transition-colors">المقالات</a>
                        </li>
                        <li><i class="fa-solid fa-chevron-left text-[10px] opacity-50"></i></li>
                        <li class="text-gray-900 dark:text-gray-100 font-bold truncate max-w-[150px] sm:max-w-xs" aria-current="page">${article.title}</li>
                    </ol>
                </nav>

                <div class="mb-10 flex flex-wrap items-center gap-4 text-xs font-mono text-gray-400 dark:text-gray-500 uppercase tracking-widest" dir="ltr">
                    <span class="font-bold border border-blue-200 dark:border-blue-900/30 bg-blue-50 dark:bg-blue-900/10 px-3 py-1 rounded text-blue-600 dark:text-blue-400">[ ${article.category} ]</span>
                    <span class="opacity-40 text-xs">Δ</span>
                    <time>${article.date}</time>
                    <span class="opacity-40 text-xs">Δ</span>
                    <span>${article.readTime} MIN READ</span>
                </div>
                <!-- decorative background equation purely for physics flavor -->
                <div class="absolute top-0 right-0 -mt-10 -mr-16 text-[80px] md:text-[120px] font-bold text-gray-100 dark:text-gray-900/30 select-none z-[-1] opacity-60 font-serif leading-none italic pointer-events-none">ℏ</div>
                
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-gray-900 dark:text-white mb-6 leading-[1.4] relative z-10 w-full">
                    ${article.title}
                </h1>
            `;
            document.getElementById('article-header').innerHTML = headerHtml;
            document.title = article.title + " | فيزياء.تك";

            // Cover Image
            if (article.image) {
                const coverContainer = document.getElementById('article-cover');
                const coverImg = document.getElementById('cover-img');
                coverImg.src = article.image;
                coverImg.alt = article.title;
                coverContainer.classList.remove('hidden');
            }

            // Fetch Markdown Content
            try {
                const response = await fetch(article.file);
                if (!response.ok) throw new Error("File not found");
                const markdownContent = await response.text();

                // Configure Marked.js with KaTeX
                if(typeof markedKatex !== 'undefined') {
                    marked.use(markedKatex({ throwOnError: false }));
                }
                marked.setOptions({
                    breaks: true,
                    gfm: true
                });
                const rawHtml = marked.parse(markdownContent);
                
                // Allow iframes, video, and MathML tags
                const cleanHtml = DOMPurify.sanitize(rawHtml, {
                    ADD_TAGS: ['iframe', 'video', 'source', 'math', 'annotation', 'semantics', 'mrow', 'mi', 'mo', 'mn', 'msup', 'msubsup', 'munderover', 'mfrac', 'msqrt', 'mroot', 'mstyle', 'mspace', 'menclose', 'merror', 'mpadded', 'mphantom', 'mfenced', 'mtable', 'mtr', 'mtd'],
                    ADD_ATTR: ['allow', 'allowfullscreen', 'frameborder', 'scrolling', 'src', 'controls', 'autoplay', 'xmlns', 'display', 'class', 'style', 'aria-hidden']
                });

                const contentDiv = document.getElementById('article-content');
                contentDiv.innerHTML = cleanHtml;

                // --- Generate Table of Contents (TOC) ---
                const headings = contentDiv.querySelectorAll('h2, h3');
                if (headings.length > 0) {
                    let tocHtml = '<h3 class="text-sm font-bold mb-4 text-gray-900 dark:text-white uppercase tracking-widest"><i class="fa-solid fa-indent text-primary ml-2"></i> محتويات المقال</h3><ul class="space-y-3 text-sm" id="toc-list">';
                    headings.forEach((h, i) => {
                        h.id = 'heading-' + i;
                        const indentClass = h.tagName === 'H3' ? 'pr-4 text-[11px]' : 'font-bold';
                        tocHtml += `<li class="${indentClass}"><a href="#${h.id}" class="toc-link text-gray-500 dark:text-gray-400 hover:text-primary transition-colors block border-r-2 border-transparent hover:border-gray-300 dark:hover:border-gray-600 pr-3 leading-relaxed" data-target="${h.id}">${h.textContent}</a></li>`;
                    });
                    tocHtml += '</ul>';
                    
                    const desktopToc = document.getElementById('desktop-toc');
                    if(desktopToc) desktopToc.innerHTML = tocHtml;
                    
                    let mobileTocHtml = '<div class="lg:hidden bg-gray-50 dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700 mb-10">' + tocHtml + '</div>';
                    contentDiv.insertAdjacentHTML('afterbegin', mobileTocHtml);

                    // Setup Scroll-Spy
                    setupScrollSpy(headings);
                }

                // --- Bookmark Button setup ---
                const btn = document.getElementById('article-bookmark-btn');
                btn.classList.add('bookmark-btn-' + article.id);
                btn.querySelector('.bookmark-text-CURRENT_ID').classList.replace('bookmark-text-CURRENT_ID', 'bookmark-text-' + article.id);
                
                if (typeof isBookmarked === 'function' && isBookmarked(article.id)) {
                    btn.querySelector('i').classList.replace('fa-regular', 'fa-solid');
                    btn.querySelector('i').classList.add('text-yellow-500');
                    btn.classList.add('bg-yellow-50', 'dark:bg-yellow-900/20', 'border-yellow-200', 'px-3', 'py-1', 'rounded-lg');
                    btn.querySelector('span').innerText = 'محفوظ';
                }

                // Delete Button setup (admin only)
                if (localStorage.getItem('blog_admin') === 'true') {
                    const delBtn = document.getElementById('delete-btn');
                    delBtn.classList.remove('hidden');
                    delBtn.onclick = () => { if(confirm('هل أنت متأكد من حذف هذا المقال؟')) deleteArticle(article.id); };
                }

                // --- Generate Related Articles ---
                const related = articlesList.filter(a => a.category === article.category && a.id !== article.id).slice(0, 2);
                if (related.length > 0) {
                    let relatedHtml = '<div class="mt-16 pt-10 border-t border-gray-200 dark:border-gray-700"><h3 class="text-2xl font-bold mb-6 text-gray-900 dark:text-white">مقالات ذات صلة</h3><div class="grid grid-cols-1 sm:grid-cols-2 gap-6">';
                    related.forEach(rel => {
                        relatedHtml += `<a href="article.html?id=${rel.id}" class="group block bg-gray-50 dark:bg-gray-800 rounded-2xl p-4 border border-gray-100 dark:border-gray-700 hover:border-primary transition-all"><div class="aspect-video w-full overflow-hidden rounded-xl mb-4 bg-gray-200"><img src="${rel.image}" alt="${rel.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"></div><h4 class="font-bold text-gray-900 dark:text-white group-hover:text-primary mb-2 line-clamp-2">${rel.title}</h4><p class="text-xs text-gray-500 font-mono"><i class="fa-regular fa-clock ml-1"></i> ${rel.readTime} min read</p></a>`;
                    });
                    relatedHtml += '</div></div>';
                    contentDiv.insertAdjacentHTML('beforeend', relatedHtml);
                }

                // --- Format Code Blocks & Copy Buttons ---
                document.querySelectorAll('.markdown-body pre code').forEach((el) => {
                    // Highlight Syntax
                    hljs.highlightElement(el);
                    
                    // Add Copy Code Button
                    const pre = el.parentElement;
                    pre.style.position = 'relative';
                    pre.classList.add('group');
                    
                    const copyBtn = document.createElement('button');
                    copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>';
                    copyBtn.className = 'absolute top-2 left-2 w-8 h-8 flex items-center justify-center rounded-lg bg-gray-700 text-gray-300 hover:bg-gray-600 hover:text-white transition-colors text-sm opacity-0 group-hover:opacity-100 shadow-sm';
                    copyBtn.title = 'نسخ الكود';
                    
                    copyBtn.onclick = () => {
                        navigator.clipboard.writeText(el.innerText);
                        copyBtn.innerHTML = '<i class="fa-solid fa-check text-green-400"></i>';
                        setTimeout(() => copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i>', 2000);
                    };
                    
                    pre.appendChild(copyBtn);
                });

                // --- Medium Zoom for Images ---
                mediumZoom('.markdown-body img', {
                    margin: 24,
                    background: document.documentElement.classList.contains('dark') ? 'rgba(17, 24, 39, 0.95)' : 'rgba(255, 255, 255, 0.95)',
                    scrollOffset: 0,
                });

                // --- Generate Series Linking (If exists) ---
                if (article.series && typeof articlesList !== 'undefined') {
                    const seriesArticles = articlesList.filter(a => a.series === article.series).sort((a,b) => (a.seriesOrder||1) - (b.seriesOrder||1));
                    if (seriesArticles.length > 1) {
                        let seriesHtml = `<div class="bg-blue-50/50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-900/40 rounded-2xl p-6 sm:px-8 mb-10"><h4 class="text-sm font-bold text-blue-800 dark:text-blue-300 mb-4 flex items-center gap-2"><i class="fa-solid fa-link"></i> سلسلة: ${article.series}</h4><div class="flex flex-col gap-2.5">`;
                        seriesArticles.forEach(sa => {
                            const isActive = sa.id === article.id;
                            const orderNum = sa.seriesOrder || '?';
                            seriesHtml += `<a href="article.html?id=${sa.id}" class="flex items-center gap-3 text-sm pb-2.5 border-b border-blue-100/50 dark:border-blue-800/30 last:border-0 last:pb-0 ${isActive ? 'text-gray-900 dark:text-white font-extrabold cursor-default pointer-events-none' : 'text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 transition-colors hover:translate-x-[-4px]'}">
                                <span class="flex items-center justify-center w-5 h-5 ${isActive ? 'bg-primary text-white' : 'bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400 font-bold'} rounded-full text-[10px] shrink-0 font-mono">${orderNum}</span>
                                <span>${sa.title}</span> ${isActive ? '<span class="text-[10px] bg-gray-200 dark:bg-gray-700 text-gray-500 font-mono px-1.5 rounded mr-auto hidden sm:inline-block">الحالي</span>' : ''}
                            </a>`;
                        });
                        seriesHtml += `</div></div>`;
                        contentDiv.insertAdjacentHTML('afterbegin', seriesHtml);
                    }
                }

            } catch (e) {
                showError("عذراً، حدث خطأ أثناء جلب محتوى المقال. تأكد من تشغيل الموقع عبر خادم محلي (Live Server).");
                console.error(e);
            }
            
            // Setup Reading Progress Bar & Scroll to Top
            const scrollTopBtn = document.getElementById('scroll-to-top');
            window.addEventListener('scroll', () => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (winScroll / height) * 100;
                document.getElementById('progress-bar').style.width = scrolled + '%';
                
                if (winScroll > 500) {
                    scrollTopBtn.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                } else {
                    scrollTopBtn.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                }
            });

            scrollTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        function setupScrollSpy(headingsArray) {
            const tocLinks = document.querySelectorAll('.toc-link');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        tocLinks.forEach(link => {
                            link.classList.remove('text-primary', 'dark:text-primary', 'border-primary', 'font-extrabold');
                            link.classList.add('text-gray-500', 'dark:text-gray-400', 'border-transparent');
                            if (link.getAttribute('data-target') === entry.target.id) {
                                link.classList.add('text-primary', 'dark:text-primary', 'border-primary', 'font-extrabold');
                                link.classList.remove('text-gray-500', 'dark:text-gray-400', 'border-transparent');
                            }
                        });
                    }
                });
            }, { rootMargin: '-10% 0px -80% 0px' });
            
            headingsArray.forEach(h => observer.observe(h));
        }

        function showError(msg) {
            document.getElementById('article-header').innerHTML = `<div class="text-red-500 font-bold text-xl">${msg}</div>`;
            document.getElementById('article-content').innerHTML = ``;
            document.getElementById('article-cover').classList.add('hidden');
        }
    </script>
    <script src="search.js"></script>
</body>
</html>
